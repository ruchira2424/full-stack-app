<!DOCTYPE html>
<html>
<head>
  <title>Full Stack App</title>
</head>
<body>
  <h1>🚀 Full Stack App Working!</h1>
  <button onclick="loadData()">Call API</button>
  <p id="output"></p>

  <script>
    function loadData() {
      fetch('/api')
        .then(res => res.json())
        .then(data => {
          document.getElementById('output').innerText = data.message;
        });
    }
  </script>
</body>
</html>
